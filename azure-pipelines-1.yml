trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
- group: deployment_token

steps:

- task: NodeTool@0
  inputs:
    versionSpec: '16.x'
  displayName: Install Node.js

- script: |
    npm install
    npm run build
  displayName: Build React App

- task: AzureStaticWebApp@0
  inputs:
    app_location: 'build'
    output_location: ''
    skip_app_build: true
    skip_api_build: true
    azure_static_web_apps_api_token: $(swa_token)